name: Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install 7z (Windows)
        run: choco install 7zip -y

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download MPV (Tauri Sidecar)
        run: |
          bash scripts/download-mpv-tauri.sh
          echo "Checking if mpv binary was created:"
          ls -la packages/app/src-tauri/bin/ || echo "bin directory not found or empty"
        shell: bash
        continue-on-error: true

      - name: Download FFmpeg (Tauri Sidecar)
        run: |
          cd packages/app
          node scripts/download-ffmpeg.js
          cd ../..
          echo "Checking if FFmpeg binary was created:"
          ls -la packages/app/src-tauri/bin/ || echo "bin directory not found or empty"
        shell: bash
        continue-on-error: true

      - name: Read release notes
        id: release-notes
        run: |
          # Try to read CHANGELOG.md for this version
          VERSION=${{ github.ref_name }}
          if [ -f CHANGELOG.md ]; then
            # Extract notes for this version (everything between this version and the next)
            NOTES=$(sed -n "/^## \\$VERSION/,/^## /p" CHANGELOG.md | sed '$d' | tail -n +2)
            if [ -z "$NOTES" ]; then
              NOTES="See CHANGELOG.md for full release notes."
            fi
          else
            NOTES="See the assets to download this version and install."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Tauri App
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: ${{ steps.release-notes.outputs.body }}
          prerelease: false

      - name: Check build status
        if: steps.tauri-build.outcome == 'failure'
        run: |
          echo "::warning::Tauri build failed"
